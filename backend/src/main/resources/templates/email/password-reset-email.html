<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset hasła</title>
</head>
<body style="margin:0;padding:24px;background:#f7f7f7;font-family:Arial,sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr>
        <td align="center">
            <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="background:#ffffff;border-radius:12px;padding:24px;">
                <tr>
                    <td style="color:#111111;font-size:22px;font-weight:700;padding-bottom:12px;">
                        Reset hasła
                    </td>
                </tr>
                <tr>
                    <td style="color:#333333;font-size:15px;line-height:1.5;padding-bottom:20px;">
                        Kliknij przycisk poniżej, aby ustawić nowe hasło do konta w AI Trading Journal.
                    </td>
                </tr>
                <tr>
                    <td align="left">
                        <a th:href="${resetUrl}"
                           style="display:inline-block;background:#111111;color:#ffffff;text-decoration:none;font-size:15px;font-weight:600;padding:12px 20px;border-radius:8px;">
                            Ustaw nowe hasło
                        </a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</html>
