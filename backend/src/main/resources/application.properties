spring.application.name=ai-trading-journal-backend
server.address=127.0.0.1
server.port=8080
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS}
app.activation.base-url=${APP_ACTIVATION_BASE_URL}
app.activation.from-email=${APP_ACTIVATION_FROM_EMAIL}
app.activation.token-expiration-hours=${APP_ACTIVATION_TOKEN_EXPIRATION_HOURS}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS}
