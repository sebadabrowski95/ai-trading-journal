name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SPRING_AI_OPENAI_API_KEY: ${{ secrets.SPRING_AI_OPENAI_API_KEY }}
      APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      SPRING_JPA_DDL_AUTO: update
      APP_JWT_EXPIRATION_SECONDS: 3600
      APP_ACTIVATION_BASE_URL: http://localhost:8080
      APP_ACTIVATION_FROM_EMAIL: noreply@example.com
      APP_ACTIVATION_TOKEN_EXPIRATION_HOURS: 24
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_SMTP_AUTH: false
      MAIL_SMTP_STARTTLS: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        working-directory: backend
        run: ./gradlew test
